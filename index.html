<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODE MUNDIAL 2026 | PREMIUM CLOUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg: #030a06;
            --glass: rgba(0, 0, 0, 0.6);
            --neon-blue: #00f2ff;
            --fifa-green: #0d4429;
            --text: #ffffff;
            --gold: #ffd700;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; }
        body {
            color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(rgba(3, 10, 6, 0.88), rgba(3, 10, 6, 0.88)), url('https://media.ambito.com/p/92a70a8de4014cd4f16c280d7f03c324/adjuntos/239/imagenes/040/392/0040392526/mundial-2026jpg.jpg');
            background-size: cover; background-position: center center; background-attachment: fixed;
        }

        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 2000; padding: 20px; background: rgba(3, 10, 6, 0.95); }
        .login-card { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.08); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .login-card h2 { font-family: 'Montserrat'; font-weight: 900; color: var(--neon-blue); margin-bottom: 25px; }
        .login-card input { width: 100%; padding: 12px 20px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.6); color: white; font-family: 'Inter'; font-weight: 700; text-transform: uppercase; }
        .login-card input[type="password"] { text-transform: none; }
        
        .login-actions { display: flex; gap: 10px; margin-top: 10px; }
        .login-card button { width: 100%; padding: 14px; border-radius: 50px; border: none; background: linear-gradient(45deg, var(--neon-blue), #1a7c4a); color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .login-card button.btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

        #capture-area { width: 100%; max-width: 1600px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { display: flex; flex-direction: column; align-items: center; margin: 25px 0 15px 0; }
        .brand-logo { max-width: 280px; height: auto; filter: drop-shadow(0 4px 15px rgba(0, 242, 255, 0.25)); margin-bottom: 15px; }
        .user-signature { font-size: 1rem; color: var(--gold); font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }

        .groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; width: 100%; margin-bottom: 20px; }
        .group-card { background: var(--glass); border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); padding: 10px; }
        .group-header { text-align: center; font-family: 'Montserrat'; font-weight: 900; color: var(--neon-blue); padding-bottom: 8px; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 8px; }
        .team-list { display: flex; flex-direction: column; gap: 5px; }
        
        .team-row { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 5px; display: flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 700; cursor: grab; user-select: none; }
        .pos-num { color: var(--neon-blue); font-size: 1.2rem; font-family: 'Montserrat'; font-weight: 900; width: 24px; text-align: center; flex-shrink: 0; }
        .team-row img { width: 22px; height: 15px; border-radius: 2px; flex-shrink: 0; object-fit: cover; }
        .team-name { flex-grow: 1; text-align: left; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
        .star-btn { cursor: pointer; color: rgba(255,255,255,0.15); font-size: 1.2rem; padding: 0 4px; }
        .star-btn.selected { color: var(--gold); }
        .arrow-btn { background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; width: 24px; height: 24px; border-radius: 3px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; }

        /* SECCIÓN DE PARTICIPANTES COMPARTIDOS */
        .ranking-section { width: 100%; max-width: 1000px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-top: 20px; margin-bottom: 20px; }
        .ranking-section h3 { font-family: 'Montserrat'; font-weight: 900; color: var(--gold); margin-top: 0; border-bottom: 2px solid var(--gold); padding-bottom: 8px; text-transform: uppercase; }
        .players-list { display: flex; flex-direction: column; gap: 10px; }
        .player-row-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 12px; }
        .player-header-clickable { display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; }
        .player-header-clickable:hover { color: var(--neon-blue); }
        .preview-pane { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .mini-group-box { background: rgba(0,0,0,0.4); border-radius: 4px; padding: 6px; font-size: 0.65rem; }
        .mini-group-title { color: var(--neon-blue); font-weight: 900; text-align: center; margin-bottom: 4px; }
        .mini-team-item { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; background: rgba(255,255,255,0.02); padding: 2px 4px; border-radius: 2px; }
        .mini-team-item img { width: 14px; height: 10px; object-fit: cover; }
        .mini-star { color: var(--gold); font-size: 0.6rem; margin-left: auto; }

        /* BRACKET RESPONSIVO PROTEGIDO */
        .bracket-container { display: grid; grid-template-columns: 41% 18% 41%; width: 100%; gap: 10px; background: rgba(0, 0, 0, 0.65); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 40px; }
        .side-block { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: stretch; }
        .center-block { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 0 5px; }
        .round-col { display: flex; flex-direction: column; justify-content: space-around; height: 100%; min-height: 600px; padding-top: 30px; position: relative; }
        .phase-label { position: absolute; top: 0; left: 0; right: 0; text-align: center; font-family: 'Montserrat'; font-weight: 900; font-size: 0.58rem; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 6px; }
        .center-phase-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; height: 100%; min-height: 600px; padding-top: 30px; position: relative; justify-content: center; }
        .match-box { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 155px; margin: 0 auto; }
        
        .slot { background: linear-gradient(to right, var(--fifa-green), #0a331f); display: flex; align-items: center; padding: 0 8px; height: 32px; gap: 6px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .slot.winner { background: #1a7c4a; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .match-box img { width: 22px; height: 15px; border-radius: 2px; flex-shrink: 0; object-fit: cover; }
        .slot-img-placeholder { width: 22px; height: 15px; flex-shrink: 0; }
        .t-name { font-size: 0.6rem; font-weight: 800; flex-grow: 1; min-width: 0; text-align: left; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .coord-label { font-size: 0.5rem; color: rgba(255,255,255,0.3); font-weight: 900; min-width: 20px; text-align: right; flex-shrink: 0; }

        .actions-panel { display: flex; gap: 15px; margin: 25px 0; justify-content: center; }
        .btn-premium { padding: 12px 35px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-save { background: var(--neon-blue); color: black; }
        .btn-calc { background: white; color: black; }
        #champion-box { background: var(--gold); color: black; padding: 12px 10px; border-radius: 8px; font-weight: 900; font-size:0.75rem; margin: 15px 0; text-align: center; width: 100%; max-width: 150px; text-transform: uppercase; box-shadow: 0 0 15px var(--gold); }
        
        .hidden { display: none !important; }
        .lock-notice { background: var(--danger); color: white; padding: 10px; width: 100%; text-align: center; font-weight: 700; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>PRODE MUNDIAL 2026</h2>
            <input type="text" id="user-displayname" placeholder="Nombre y Apellido" required>
            <input type="password" id="user-pass" placeholder="Tu Contraseña" required>
            <div class="login-actions">
                <button id="login-btn">Iniciar Sesión</button>
                <button id="register-btn" class="btn-secondary">Registrarse</button>
            </div>
        </div>
    </div>

    <div id="capture-area" class="hidden">
        <header>
            <img class="brand-logo" src="https://media.ambito.com/p/92a70a8de4014cd4f16c280d7f03c324/adjuntos/239/imagenes/040/392/0040392526/mundial-2026jpg.jpg" alt="Mundial 2026">
            <div id="user-display" class="user-signature"></div>
        </header>

        <div id="lock-banner" class="lock-notice hidden">🔒 FASE DE GRUPOS CERRADA. MODO SÓLO LECTURA.</div>

        <div class="groups-grid" id="groups-container"></div>

        <div class="actions-panel">
            <button id="save-progress-btn" class="btn-premium btn-save">💾 Guardar Progreso en la Nube</button>
            <button class="btn-premium btn-calc" onclick="startBrackets()">Generar Eliminatorias</button>
        </div>

        <div class="ranking-section">
            <h3>👥 Pronósticos de los Participantes</h3>
            <div class="players-list" id="global-players-list">
                <p style="font-size:0.8rem; opacity:0.6; text-align:center;">Cargando participantes...</p>
            </div>
        </div>

        <div id="bracket-ui" class="bracket-container hidden">
            <div class="side-block">
                <div class="round-col"><div class="phase-label">16avos de Final</div><div id="r16-1"></div><div id="r16-2"></div><div id="r16-3"></div><div id="r16-4"></div><div id="r16-5"></div><div id="r16-6"></div><div id="r16-7"></div><div id="r16-8"></div></div>
                <div class="round-col"><div class="phase-label">Octavos</div><div id="r8-1"></div><div id="r8-2"></div><div id="r8-3"></div><div id="r8-4"></div></div>
                <div class="round-col"><div class="phase-label">Cuartos</div><div id="r4-1"></div><div id="r4-2"></div></div>
            </div>
            <div class="center-block">
                <div class="center-phase-wrapper">
                    <div class="phase-label">Semifinales y Final</div>
                    <div id="r2-1" style="width:100%"></div>
                    <div id="champion-box">🏆 CAMPEÓN</div>
                    <div id="final-match" style="width:100%"></div>
                    <div id="r2-2" style="margin-top:25px; width:100%"></div>
                </div>
            </div>
            <div class="side-block">
                <div class="round-col"><div class="phase-label">Cuartos</div><div id="r4-3"></div><div id="r4-4"></div></div>
                <div class="round-col"><div class="phase-label">Octavos</div><div id="r8-5"></div><div id="r8-6"></div><div id="r8-7"></div><div id="r8-8"></div></div>
                <div class="round-col"><div class="phase-label">16avos de Final</div><div id="r16-9"></div><div id="r16-10"></div><div id="r16-11"></div><div id="r16-12"></div><div id="r16-13"></div><div id="r16-14"></div><div id="r16-15"></div><div id="r16-16"></div></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYwfYvyjsb4mdwHdFA8ZdPHF-FUm5n6ho",
            authDomain: "prode-mundial-2026-8ed7e.firebaseapp.com",
            projectId: "prode-mundial-2026-8ed7e",
            storageBucket: "prode-mundial-2026-8ed7e.firebasestorage.app",
            messagingSenderId: "306941694619",
            appId: "1:306941694619:web:ca6aa110d6b395e20bec3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const FECHA_LIMITE = new Date("2026-06-11T12:00:00");
        if (new Date() > FECHA_LIMITE) { window.isLocked = true; }

        window.gruposData = {
            "A": [{n: "México", c: "mx"}, {n: "Sudáfrica", c: "za"}, {n: "Corea del Sur", c: "kr"}, {n: "República Checa", c: "cz"}],
            "B": [{n: "Canadá", c: "ca"}, {n: "Bosnia y Herzegovina", c: "ba"}, {n: "Catar", c: "qa"}, {n: "Suiza", c: "ch"}],
            "C": [{n: "Brasil", c: "br"}, {n: "Marruecos", c: "ma"}, {n: "Haití", c: "ht"}, {n: "Escocia", c: "gb-sct"}],
            "D": [{n: "Estados Unidos", c: "us"}, {n: "Paraguay", c: "py"}, {n: "Australia", c: "au"}, {n: "Turquía", c: "tr"}],
            "E": [{n: "Alemania", c: "de"}, {n: "Curazao", c: "cw"}, {n: "Costa de Marfil", c: "ci"}, {n: "Ecuador", c: "ec"}],
            "F": [{n: "Países Bajos", c: "nl"}, {n: "Japón", c: "jp"}, {n: "Suecia", c: "se"}, {n: "Túnez", c: "tn"}],
            "G": [{n: "Bélgica", c: "be"}, {n: "Egipto", c: "eg"}, {n: "Irán", c: "ir"}, {n: "Nueva Zelanda", c: "nz"}],
            "H": [{n: "España", c: "es"}, {n: "Cabo Verde", c: "cv"}, {n: "Arabia Saudita", c: "sa"}, {n: "Uruguay", c: "uy"}],
            "I": [{n: "Francia", c: "fr"}, {n: "Senegal", c: "sn"}, {n: "Irak", c: "iq"}, {n: "Noruega", c: "no"}],
            "J": [{n: "Argentina", c: "ar"}, {n: "Argelia", c: "dz"}, {n: "Austria", c: "at"}, {n: "Jordania", c: "jo"}],
            "K": [{n: "Portugal", c: "pt"}, {n: "República Democrática del Congo", c: "cd"}, {n: "Uzbekistán", c: "uz"}, {n: "Colombia", c: "co"}],
            "L": [{n: "Inglaterra", c: "gb"}, {n: "Croacia", c: "hr"}, {n: "Ghana", c: "gh"}, {n: "Panamá", c: "pa"}]
        };

        // LÓGICA DE INICIO DE SESIÓN DIRECTA
        async function loginUser() {
            const displayName = document.getElementById('user-displayname').value.trim();
            const pass = document.getElementById('user-pass').value.trim();

            if (!displayName || !pass) { alert("Ingresa tu Nombre y Contraseña."); return; }
            const cleanName = displayName.toLowerCase().replace(/[^a-z0-9]/g, "");
            const simulatedEmail = `${cleanName}@prodemundial.com`;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, simulatedEmail, pass);
                await cargarProgresoUsuario(userCredential.user.uid, displayName);
            } catch (error) {
                alert("Error: Contraseña incorrecta o el usuario no existe. Si eres nuevo, haz clic en 'Registrarse'.");
            }
        }

        // LÓGICA DE REGISTRO NUEVO
        async function registerUser() {
            const displayName = document.getElementById('user-displayname').value.trim();
            const pass = document.getElementById('user-pass').value.trim();

            if (!displayName || !pass) { alert("Completa ambos campos para registrarte."); return; }
            if (pass.length < 6) { alert("La contraseña debe tener al menos 6 caracteres."); return; }

            const cleanName = displayName.toLowerCase().replace(/[^a-z0-9]/g, "");
            const simulatedEmail = `${cleanName}@prodemundial.com`;

            try {
                const newCredential = await createUserWithEmailAndPassword(auth, simulatedEmail, pass);
                await updateProfile(newCredential.user, { displayName: displayName });
                await cargarProgresoUsuario(newCredential.user.uid, displayName);
                alert("¡Usuario creado con éxito!");
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("Este nombre ya está registrado. Si es tuyo, introduce tu clave e inicia sesión.");
                } else {
                    alert("Error en el registro: " + error.message);
                }
            }
        }

        async function cargarProgresoUsuario(uid, name) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('capture-area').classList.remove('hidden');
            document.getElementById('user-display').innerText = `PARTICIPANTE: ${name}`;

            if (window.isLocked) {
                document.getElementById('lock-banner').classList.remove('hidden');
                document.getElementById('save-progress-btn').classList.add('hidden');
            }

            try {
                const userDoc = await getDoc(doc(db, "usuarios", uid));
                if (userDoc.exists() && userDoc.data().prediccion) {
                    window.gruposData = userDoc.data().prediccion;
                }
            } catch (e) {
                console.log("Cargando posiciones por defecto.");
            }
            window.init();
            await cargarListaGlobal();
        }

        async function guardarProgresoNube() {
            if (window.isLocked || new Date() > FECHA_LIMITE) { 
                alert("🔒 El Prode está cerrado. Se alcanzó la fecha límite."); return; 
            }
            const user = auth.currentUser;
            if (!user) return;

            const saveBtn = document.getElementById('save-progress-btn');
            saveBtn.innerText = "💾 Guardando..."; saveBtn.disabled = true;

            try {
                await setDoc(doc(db, "usuarios", user.uid), {
                    nombre: user.displayName,
                    emailSimulado: user.email,
                    prediccion: window.gruposData,
                    ultimaActualizacion: new Date().toISOString()
                }, { merge: true });
                alert("¡Progreso guardado exitosamente en la nube!");
                await cargarListaGlobal();
            } catch (err) {
                alert("Error al guardar: " + err.message);
            } finally {
                saveBtn.innerText = "💾 Guardar Progreso en la Nube"; saveBtn.disabled = false;
            }
        }

        // FUNCIÓN CLAVE: CARGA DE TODOS LOS USUARIOS Y MINIATURAS
        async function cargarListaGlobal() {
            const listContainer = document.getElementById('global-players-list');
            listContainer.innerHTML = '';

            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                if(querySnapshot.empty) {
                    listContainer.innerHTML = '<p style="font-size:0.8rem; opacity:0.5; text-align:center;">Nadie ha guardado su prode aún.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const pRow = document.createElement('div');
                    pRow.className = 'player-row-box';
                    
                    pRow.innerHTML = `
                        <div class="player-header-clickable" onclick="togglePreviewPane('${docSnap.id}')">
                            <span>👤 ${data.nombre}</span>
                            <span>${window.isLocked ? '🔽 Ver Predicción' : '🔒 Se revela el 11/06'}</span>
                        </div>
                        <div id="pane-${docSnap.id}" class="preview-pane hidden"></div>
                    `;
                    listContainer.appendChild(pRow);

                    // Si está bloqueado (ya empezó el mundial) armamos el desglose de miniaturas
                    if (window.isLocked && data.prediccion) {
                        const pane = document.getElementById(`pane-${docSnap.id}`);
                        Object.keys(data.prediccion).forEach(gn => {
                            const mBox = document.createElement('div');
                            mBox.className = 'mini-group-box';
                            mBox.innerHTML = `<div class="mini-group-title">G-${gn}</div>`;
                            
                            data.prediccion[gn].forEach((t, index) => {
                                mBox.innerHTML += `
                                    <div class="mini-team-item">
                                        <b style="color:var(--neon-blue); width:9px;">${index+1}</b>
                                        <img src="https://flagcdn.com/w40/${t.c}.png">
                                        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis; max-width:85px;">${t.n}</span>
                                        ${t.star ? '<span class="mini-star">★</span>' : ''}
                                    </div>`;
                            });
                            pane.appendChild(mBox);
                        });
                    }
                });
            } catch (e) {
                listContainer.innerHTML = '<p style="font-size:0.8rem; color:var(--danger);">Error al cargar participantes.</p>';
            }
        }

        // Hacer visibles las funciones para el HTML clásico
        window.togglePreviewPane = function(id) {
            if(!window.isLocked) {
                alert("🔒 ¡Juego limpio! Las predicciones de los demás participantes se abrirán automáticamente el 11/06 a las 12:00 hs cuando cierre el Prode.");
                return;
            }
            const pane = document.getElementById(`pane-${id}`);
            if(pane) pane.classList.toggle('hidden');
        }

        document.getElementById('login-btn').addEventListener('click', loginUser);
        document.getElementById('register-btn').addEventListener('click', registerUser);
        document.getElementById('save-progress-btn').addEventListener('click', guardarProgresoNube);
    </script>

    <script>
        // [Mantiene el mismo bloque idéntico de funciones JS: moveT, toggleStar, advance, startBrackets]
        const r16_coords = [
            {t1: "1E", t2: "3ABCDEF", n:"r8-1"}, {t1: "1I", t2: "3CDFGH", n:"r8-1"},
            {t1: "2A", t2: "2B", n:"r8-2"}, {t1: "1F", t2: "2C", n:"r8-2"},
            {t1: "2K", t2: "2L", n:"r8-3"}, {t1: "1H", t2: "2J", n:"r8-3"},
            {t1: "1D", t2: "3BEFIJ", n:"r8-4"}, {t1: "1G", t2: "3AEHIJ", n:"r8-4"},
            {t1: "1C", t2: "2F", n:"r8-5"}, {t1: "2E", t2: "2I", n:"r8-5"},
            {t1: "1A", t2: "3CEFHI", n:"r8-6"}, {t1: "1L", t2: "3EHIJK", n:"r8-6"},
            {t1: "1J", t2: "2H", n:"r8-7"}, {t1: "2D", t2: "2G", n:"r8-7"},
            {t1: "1B", t2: "3EFGIJ", n:"r8-8"}, {t1: "1K", t2: "3DEIJL", n:"r8-8"}
        ];

        window.init = function() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            Object.keys(window.gruposData).forEach(gn => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `<div class="group-header">GRUPO ${gn}</div><div class="team-list" id="list-${gn}"></div>`;
                container.appendChild(card);
                renderTeamList(gn);
            });
        }

        function renderTeamList(gn) {
            const list = document.getElementById(`list-${gn}`);
            list.innerHTML = '';
            window.gruposData[gn].forEach((t, i) => {
                const row = document.createElement('div');
                row.className = 'team-row';
                row.innerHTML = `
                    <span class="pos-num">${i+1}</span>
                    <img src="https://flagcdn.com/w40/${t.c}.png">
                    <span class="team-name" title="${t.n}">${t.n}</span>
                    <div class="controls">
                        ${i === 2 ? `<span class="star-btn ${t.star ? 'selected' : ''}" onclick="event.stopPropagation(); if(!window.isLocked) toggleStar('${gn}', ${i})">★</span>` : ''}
                        ${!window.isLocked ? `<button class="arrow-btn" onclick="event.stopPropagation(); moveT('${gn}',${i},-1)">▲</button>` : ''}
                        ${!window.isLocked ? `<button class="arrow-btn" onclick="event.stopPropagation(); moveT('${gn}',${i},1)">▼</button>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function moveT(g, i, d) {
            const ni = i + d;
            if (ni >= 0 && ni < 4) {
                const temp = window.gruposData[g][i];
                window.gruposData[g].splice(i, 1);
                window.gruposData[g].splice(ni, 0, temp);
                renderTeamList(g);
            }
        }

        function toggleStar(g, i) {
            const total = Object.values(window.gruposData).flat().filter(x => x.star).length;
            if (!window.gruposData[g][i].star && total >= 8) return;
            window.gruposData[g][i].star = !window.gruposData[g][i].star;
            renderTeamList(g);
        }

        function createMatchHTML(id, t1, t2, c1, c2, next) {
            return `
            <div class="match-box" id="box-${id}">
                <div class="slot" onclick="advance('${id}', 0, '${next}')">
                    ${t1.f ? `<img src="https://flagcdn.com/w40/${t1.f}.png">` : '<div class="slot-img-placeholder"></div>'}
                    <span class="t-name" title="${t1.n || ''}">${t1.n || '---'}</span>
                    <span class="coord-label">${c1}</span>
                </div>
                <div class="slot" onclick="advance('${id}', 1, '${next}')">
                    ${t2.f ? `<img src="https://flagcdn.com/w40/${t2.f}.png">` : '<div class="slot-img-placeholder"></div>'}
                    <span class="t-name" title="${t2.n || ''}">${t2.n || '---'}</span>
                    <span class="coord-label">${c2}</span>
                </div>
            </div>`;
        }

        function startBrackets() {
            const totalStars = Object.values(window.gruposData).flat().filter(t => t.star).length;
            if (totalStars !== 8) { alert("Por favor, marca exactamente 8 mejores terceros usando la estrella (★)."); return; }
            
            const stars = Object.values(window.gruposData).flat().filter(t => t.star);
            r16_coords.forEach((c, i) => {
                const team1 = c.t1.length <= 2 ? window.gruposData[c.t1[1]][parseInt(c.t1[0])-1] : stars[i % 8];
                const team2 = c.t2.length <= 2 ? window.gruposData[c.t2[1]][parseInt(c.t2[0])-1] : stars[(i+1) % 8];
                document.getElementById(`r16-${i+1}`).innerHTML = createMatchHTML(`r16-${i+1}`, {n:team1.n, f:team1.c}, {n:team2.n, f:team2.c}, c.t1, c.t2, c.n);
            });

            for(let i=1; i<=8; i++) document.getElementById(`r8-${i}`).innerHTML = createMatchHTML(`r8-${i}`, {}, {}, 'GAN', 'GAN', `r4-${Math.ceil(i/2)}`);
            for(let i=1; i<=4; i++) document.getElementById(`r4-${i}`).innerHTML = createMatchHTML(`r4-${i}`, {}, {}, 'GAN', 'GAN', `r2-${Math.ceil(i/2)}`);
            document.getElementById('r2-1').innerHTML = createMatchHTML('r2-1', {}, {}, 'SEM1', 'SEM2', 'final');
            document.getElementById('r2-2').innerHTML = createMatchHTML('r2-2', {}, {}, 'SEM3', 'SEM4', 'final');
            document.getElementById('final-match').innerHTML = createMatchHTML('final', {}, {}, 'FIN1', 'FIN2', 'champ');

            document.getElementById('bracket-ui').classList.remove('hidden');
            document.getElementById('bracket-ui').scrollIntoView({ behavior: 'smooth' });
        }

        function advance(curr, idx, next) {
            const box = document.getElementById(`box-${curr}`);
            const slots = box.querySelectorAll('.slot');
            slots.forEach(s => s.classList.remove('winner'));
            slots[idx].classList.add('winner');
            
            const name = slots[idx].querySelector('.t-name').innerText;
            const flag = slots[idx].querySelector('img')?.src;

            if (next === 'champ') { document.getElementById('champion-box').innerText = "🏆 " + name; return; }

            const nBox = document.getElementById(`box-${next}`);
            const nSlots = nBox.querySelectorAll('.slot');
            let targetIdx = (parseInt(curr.split('-')[1]) % 2 === 0) ? 1 : 0;
            if (curr.includes('r2')) targetIdx = curr.includes('r2-2') ? 1 : 0;

            nSlots[targetIdx].querySelector('.t-name').innerText = name;
            nSlots[targetIdx].querySelector('.t-name').setAttribute('title', name);
            const oldImg = nSlots[targetIdx].querySelector('img');
            if (oldImg) oldImg.remove();
            
            if (flag) {
                let img = document.createElement('img'); img.src = flag;
                nSlots[targetIdx].querySelector('.slot-img-placeholder').style.display = 'none';
                nSlots[targetIdx].prepend(img);
            }
        }
    </script>
</body>
</html>
